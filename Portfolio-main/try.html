<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Projects</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#fff;
  font-family: Arial, sans-serif;
}

/* Section Title */
.section-title{
  text-align:center;
  font-size:32px;
  font-weight:800;
  margin-bottom:50px;
  color:#38bdf8;
  letter-spacing:1px;
}

/* Card */
.project-card{
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:25px;
  transition:0.4s ease;
  height:100%;
  position:relative;
  overflow:hidden;
}

/* Glow effect */
.project-card::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 60%);
  transform: rotate(25deg);
  transition:0.5s;
}

.project-card:hover::before{
  transform: rotate(0deg);
}

.project-card:hover{
  transform: translateY(-10px);
  border-color:#38bdf8;
  box-shadow: 0 20px 50px rgba(56,189,248,0.25);
}

/* Title */
.project-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}

/* Text */
.project-text{
  font-size:14px;
  color:#cbd5e1;
  margin-bottom:15px;
}

/* Tech */
.tech{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:15px;
}

/* Badge style */
.badge-tech{
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.3);
  color:#38bdf8;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  margin-right:5px;
}

/* Button */
.btn-github{
  background: linear-gradient(135deg,#2563eb,#38bdf8);
  border:none;
  font-size:13px;
  padding:8px 14px;
  border-radius:10px;
  transition:0.3s;
}

.btn-github:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(56,189,248,0.3);
}

/* Icon */
.icon{
  color:#38bdf8;
  margin-right:6px;
}
</style>

</head>

<body>



</body>
</html>
